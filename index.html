<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Doodle - Project Demo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="view-container" id="login-view">
        <div class="background-pattern"></div>
        <div class="card">
            <h1>Dual Doodle 🎨</h1>
            <p>A modern collaborative drawing app.</p>
            <form id="login-form">
                <input type="text" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn btn-primary">Login / Sign Up</button>
            </form>
        </div>
    </section>

    <section class="view-container hidden" id="lobby-view">
        <div class="background-pattern"></div>
        <div class="card">
            <h2>Start a New Doodle</h2>
            <p>Share this link with a friend to start drawing!</p>
            <div class="invite-box">
                <input type="text" value="https://dualdoodle.com/invite/aGf8Kx" readonly>
                <button class="btn" id="copy-link-btn">Copy</button>
            </div>
            <button class="btn btn-primary" id="start-drawing-btn">Waiting for player... (Click to Start)</button>
        </div>
    </section>

    <main class="app-container hidden" id="drawing-view">
        
        <nav class="main-toolbar">
            <div class="tool-group">
                <label for="color-picker">Color:</label>
                <input type="color" id="color-picker" value="#000000">
                <div class="color-swatches">
                    <div class="swatch" data-color="#000000" style="background: #000;"></div>
                    <div class="swatch" data-color="#e63946" style="background: #e63946;"></div>
                    <div class="swatch" data-color="#f1c40f" style="background: #f1c40f;"></div>
                    <div class="swatch" data-color="#2ecc71" style="background: #2ecc71;"></div>
                    <div class="swatch" data-color="#3498db" style="background: #3498db;"></div>
                    <div class="swatch" data-color="#9b59b6" style="background: #9b59b6;"></div>
                    <div class="swatch" data-color="#e67e22" style="background: #e67e22;"></div>
                    <div class="swatch" data-color="#1abc9c" style="background: #1abc9c;"></div>
                    <div class="swatch" data-color="#c0392b" style="background: #c0392b;"></div>
                    <div class="swatch" data-color="#2c3e50" style="background: #2c3e50;"></div>
                </div>
            </div>
            <div class="tool-group">
                <label for="size-slider">Size:</label>
                <input type="range" id="size-slider" min="2" max="50" value="5">
                <span id="size-value">5</span>
            </div>
            <div class="tool-group" id="actions-group">
                <button class="btn-icon" id="undo-btn" title="Undo (Ctrl+Z)"><i class="fas fa-undo"></i></button>
                <button class="btn btn-primary" id="save-btn"><i class="fas fa-save"></i> Save</button>
            </div>
        </nav>

        <aside class="tool-palette">
            <div class="tool-group-vertical">
                <button class="tool active" data-tool="pen" title="Pen"><i class="fas fa-pen"></i></button>
                <button class="tool" data-tool="brush" title="Brush"><i class="fas fa-paint-brush"></i></button>
                <button class="tool" data-tool="bucket" title="Paint Bucket"><i class="fas fa-fill-drip"></i></button>
                <button class="tool" data-tool="eraser" title="Eraser"><i class="fas fa-eraser"></i></button>
            </div>
            <div class="tool-group-vertical">
                <button class="tool" data-tool="line" title="Line"><i class="fas fa-minus"></i></button>
                <button class="tool" data-tool="rectangle" title="Rectangle"><i class="far fa-vector-square"></i></button>
                <button class="tool" data-tool="square" title="Square"><i class="far fa-square"></i></button>
                <button class="tool" data-tool="circle" title="Circle"><i class="far fa-circle"></i></button>
                <button class="tool" data-tool="oval" title="Oval"><i class="fas fa-ellipsis-h"></i></button>
                <button class="tool" data-tool="triangle" title="Triangle"><i class="fas fa-play" style="transform: rotate(-90deg);"></i></button>
            </div>
        </aside>

        <div class="drawing-area">
            <div class="canvas-wrapper" id="your-half">
                <canvas id="player1-canvas"></canvas>
            </div>
            <div class="canvas-wrapper" id="other-half">
                <canvas id="player2-canvas"></canvas>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
